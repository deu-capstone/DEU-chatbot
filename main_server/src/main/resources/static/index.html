<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동의대 학사 상담 챗봇</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { font-family: 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body class="flex justify-center items-center h-screen bg-slate-100 p-4 text-sm">

<div class="w-full max-w-4xl h-full max-h-[820px] bg-white rounded-2xl shadow-2xl flex flex-row overflow-hidden border border-blue-100 relative">

    <aside class="w-72 bg-slate-50 border-r border-slate-200 flex flex-col z-10 hidden md:flex">
        <div class="bg-slate-100 text-slate-800 px-5 py-4 border-b border-slate-200 font-bold flex items-center">
            <i data-lucide="star" class="w-4 h-4 mr-2 text-yellow-500 fill-yellow-500"></i> 맞춤형 추천 공지
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <div>
                <h4 class="text-sm font-bold text-blue-900 mb-3 flex items-center border-b border-slate-200 pb-2">
                    <i data-lucide="graduation-cap" class="w-4 h-4 mr-1.5"></i> 내 학과 공지사항
                </h4>

                <div id="deptLoginNotice" class="text-xs mb-2 hidden"></div>
                <div id="deptInputContainer" class="flex space-x-1 mb-3">
                    <input type="text" id="deptInput" placeholder="학과 입력 (예: 소프트웨어)" class="flex-1 px-2 py-1.5 text-xs border border-slate-300 rounded focus:outline-none focus:border-blue-500">
                    <button onclick="fetchSidebarRecommendations()" class="px-2 py-1.5 bg-blue-600 text-white text-xs rounded hover:bg-blue-700">적용</button>
                </div>

                <ul id="deptRecommendList" class="space-y-2.5">
                    <li class="text-xs text-slate-500">학과를 입력하거나 로그인해주세요.</li>
                </ul>
            </div>

            <div>
                <h4 class="text-sm font-bold text-blue-900 mb-3 flex items-center border-b border-slate-200 pb-2">
                    <i data-lucide="history" class="w-4 h-4 mr-1.5"></i> 최근 관심사 추천
                </h4>
                <ul id="historyRecommendList" class="space-y-2.5">
                    <li class="text-xs text-slate-500">질문을 남기면 관심사를 분석해 드립니다.</li>
                </ul>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col relative">
        <header class="bg-blue-600 text-white px-5 py-4 flex items-center justify-between shadow-md z-10">
            <div class="flex items-center space-x-2">
                <i data-lucide="user-circle" class="w-7 h-7 text-blue-100"></i>
                <div id="headerUserInfo">
                    <span class="font-semibold text-base">게스트 사용자</span>
                </div>
            </div>
            <div class="flex items-center justify-end space-x-2">
                <button onclick="handleOpenHistory()" class="p-2 hover:bg-blue-700 rounded-full transition-colors flex items-center justify-center" title="저장된 채팅 기록 열람">
                    <i data-lucide="clock" class="w-[18px] h-[18px]"></i>
                </button>
                <div class="w-[1px] h-4 bg-blue-300 self-center opacity-60"></div>
                <div id="headerAuthArea">
                    <button onclick="triggerGoogleSignIn()" class="flex items-center space-x-1.5 px-3 py-1.5 bg-white text-blue-600 hover:bg-blue-50 rounded-lg transition-colors text-xs font-bold shadow-sm">
                        <i data-lucide="log-in" class="w-3.5 h-3.5"></i><span>학생 로그인</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 relative scroll-smooth" id="chatBox">
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center bg-no-repeat bg-center" style="background-image: url('../assets/symbol_basic.jpg'); background-size: 240px; opacity: 0.08;"></div>
            <div id="messagesContainer" class="relative z-10 space-y-4"></div>
            <div id="typingIndicator" class="flex items-start hidden fade-in">
                <div class="bg-white border border-slate-200 px-4 py-3 rounded-2xl rounded-tl-none shadow-sm flex space-x-1.5">
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 100ms"></div>
                    <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 200ms"></div>
                </div>
            </div>
        </main>

        <footer class="bg-white border-t border-slate-200 p-4 flex flex-col space-y-3 shadow-md z-10">
            <form onsubmit="event.preventDefault(); handleSendMessageSubmit();" class="flex items-center bg-slate-100 rounded-xl overflow-hidden border border-slate-300 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                <input type="text" id="userInput" placeholder="질문을 입력해주세요..." class="flex-1 bg-transparent px-4 py-3 outline-none text-slate-800 placeholder-slate-400 text-sm" oninput="checkInput()">
                <button type="submit" id="sendBtn" disabled class="p-3 text-slate-400 hover:text-blue-800 transition-colors">
                    <i data-lucide="send" class="w-5 h-5" id="sendIcon"></i>
                </button>
            </form>
        </footer>
    </div>

    <div id="googleModal" class="absolute inset-0 bg-black/50 z-50 flex justify-center items-center p-4 hidden fade-in">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-slate-200 p-6 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-900 text-base flex items-center">
                    <i data-lucide="lock" class="w-[18px] h-[18px] text-blue-600 mr-2"></i> 로그인 인증센터
                </h3>
                <button onclick="closeGoogleModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex flex-col items-center py-4">
                <span class="block text-xs font-bold text-blue-600 mb-4 self-start">🔘 원클릭 구글 계정 인증</span>
                <div id="google-visible-btn" class="w-full flex justify-center py-1 min-h-[40px]"></div>
                <p class="text-[11px] text-slate-400 mt-6 text-center leading-relaxed">동의대학교 G-Suite 학교 공식 계정(@g.deu.ac.kr)을 통해 로그인합니다.</p>
            </div>
            <div class="mt-4 pt-2 border-t border-slate-100 flex justify-end">
                <button type="button" onclick="closeGoogleModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold rounded-xl text-xs transition-colors">닫기</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="absolute inset-0 bg-black/40 z-50 flex justify-center items-center p-4 hidden fade-in">
        <div class="bg-white w-full max-w-md max-h-[80%] rounded-2xl shadow-xl flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-slate-200 bg-blue-50">
                <h3 class="font-bold text-blue-900 flex items-center"><i data-lucide="clock" class="w-[18px] h-[18px] mr-2"></i> 저장된 채팅 기록</h3>
                <div class="flex items-center space-x-2">
                    <button onclick="handleDeleteHistory()" class="text-[11px] bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded flex items-center">
                        <i data-lucide="trash-2" class="w-3 h-3 mr-1"></i>전체 삭제
                    </button>
                    <button onclick="closeHistoryModal()" class="text-slate-500 hover:text-slate-700 bg-white p-1 rounded-full"><i data-lucide="x" class="w-[18px] h-[18px]"></i></button>
                </div>
            </div>
            <div id="historyContainer" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50"></div>
        </div>
    </div>
</div>

<script>
    // 발급받으신 클라이언트 ID를 그대로 유지해주세요!
    const GOOGLE_CLIENT_ID = "838836728378-ksj7pt3ppns3a6887qvvk5ktsqcsme8p.apps.googleusercontent.com";

    let currentUser = null;
    let messages = [];
    let isTypingStatus = false;

    const FAQ_LIST = ["학사일정이 어떻게 되나요?", "장학금 신청 절차를 알려주세요.", "수강신청 정정 기간은 언제인가요?"];

    function refreshIcons() { lucide.createIcons(); }
    function scrollToBottom() { const b = document.getElementById('chatBox'); b.scrollTop = b.scrollHeight; }

    function renderHeader() {
        const userInfo = document.getElementById('headerUserInfo');
        const authArea = document.getElementById('headerAuthArea');
        if (currentUser) {
            userInfo.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-base leading-snug">${currentUser.fullName}</span>
                        <span class="text-[11px] text-blue-200 mt-0.5">${currentUser.email}</span>
                    </div>`;
            authArea.innerHTML = `
                    <button onclick="handleLogout()" class="flex items-center space-x-1 px-3 py-1.5 bg-blue-700 hover:bg-blue-800 rounded-lg transition-colors text-xs font-semibold text-white">
                        <i data-lucide="log-out" class="w-3.5 h-3.5"></i><span>로그아웃</span>
                    </button>`;
        } else {
            userInfo.innerHTML = `<span class="font-semibold text-base">게스트 사용자</span>`;
            authArea.innerHTML = `
                    <button onclick="triggerGoogleSignIn()" class="flex items-center space-x-1.5 px-3 py-1.5 bg-white text-blue-600 hover:bg-blue-50 rounded-lg transition-colors text-xs font-bold shadow-sm">
                        <i data-lucide="log-in" class="w-3.5 h-3.5"></i><span>학생 로그인</span>
                    </button>`;
        }
        refreshIcons();

        // 🌟 [핵심 1] 화면이 켜지거나 로그인/로그아웃 할 때만 딱 한 번 추천 갱신!
        fetchSidebarRecommendations();
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        messages.forEach(msg => {
            const isUser = msg.sender === 'user';
            let html = `
                    <div class="flex flex-col fade-in">
                        <div class="flex flex-col ${isUser ? 'items-end' : 'items-start'}">
                            <div class="max-w-[85%] px-4 py-2.5 rounded-2xl shadow-sm ${isUser ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 border border-slate-200 rounded-tl-none'}">
                                <p class="whitespace-pre-wrap leading-relaxed">${msg.text}</p>
                            </div>
                            <span class="text-[10px] text-slate-400 mt-1 px-1">${msg.timestamp}</span>
                        </div>
                `;
            if (msg.id === 'welcome') {
                html += `
                        <div class="mt-4 p-4 bg-white border border-blue-100 rounded-xl shadow-sm space-y-2 max-w-[90%] self-start fade-in">
                            <p class="text-xs font-bold text-blue-600 mb-2 flex items-center">💡 자주 묻는 질문 항목</p>
                            <div class="grid grid-cols-1 gap-2">
                                ${FAQ_LIST.map(faq => `
                                    <button onclick="handleSendMessage('${faq}')" class="text-left w-full bg-slate-50 hover:bg-blue-50 text-slate-700 border border-slate-200 px-3 py-2 rounded-lg text-xs transition-all flex justify-between">
                                        <span>${faq}</span><i data-lucide="chevron-right" class="w-3.5 h-3.5 opacity-60 text-blue-500"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>`;
            }
            html += `</div>`;
            container.insertAdjacentHTML('beforeend', html);
        });
        refreshIcons();
        scrollToBottom();
        // 🌟 [핵심 2] 채팅 칠 때마다 추천 서버를 괴롭히지 않도록 여기서 갱신 코드 삭제함!
    }

    function checkInput() {
        const input = document.getElementById('userInput').value.trim();
        const btn = document.getElementById('sendBtn');
        const icon = document.getElementById('sendIcon');
        if (input && !isTypingStatus) {
            btn.disabled = false; btn.classList.add('text-blue-600'); btn.classList.remove('text-slate-400'); icon.style.fill = 'currentColor';
        } else {
            btn.disabled = true; btn.classList.remove('text-blue-600'); btn.classList.add('text-slate-400'); icon.style.fill = 'none';
        }
    }

    // 🌟 [핵심 3] 추천 로직: 화면 메모리가 아니라 안전한 DB에서 무조건 꺼내오도록 업그레이드!
    async function fetchSidebarRecommendations() {
        const deptList = document.getElementById('deptRecommendList');
        const historyList = document.getElementById('historyRecommendList');

        // 1. 학과 추천 로직
        let deptQuery = "";
        if (currentUser) {
            deptQuery = currentUser.fullName;
            document.getElementById('deptInputContainer').style.display = 'none';
            document.getElementById('deptLoginNotice').innerHTML = `<span class="font-bold text-blue-600">${currentUser.fullName}</span> 관련 맞춤 공지`;
            document.getElementById('deptLoginNotice').style.display = 'block';
        } else {
            deptQuery = document.getElementById('deptInput').value.trim();
            document.getElementById('deptInputContainer').style.display = 'flex';
            document.getElementById('deptLoginNotice').style.display = 'none';
        }

        if (deptQuery) {
            deptList.innerHTML = '<li class="text-xs text-slate-400 animate-pulse">공지사항 탐색 중...</li>';
            try {
                const res = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ department: deptQuery, history: [] })
                });
                const data = await res.json();
                if(data.recommendations && data.recommendations.length > 0) {
                    deptList.innerHTML = data.recommendations.map(item => `<li><a href="${item.link}" target="_blank" class="text-xs text-slate-700 hover:text-blue-600 hover:underline block leading-relaxed line-clamp-2">📄 ${item.title}</a></li>`).join('');
                } else {
                    deptList.innerHTML = '<li class="text-xs text-slate-500">최근 관련된 공지가 없습니다.</li>';
                }
            } catch(e) { deptList.innerHTML = '<li class="text-xs text-red-500">추천 서버 연결 실패</li>'; }
        }

        // 2. 검색 기록(관심사) 추천 로직 (화면에 뜬 글씨가 아니라 DB에서 과거 기록 꺼내오기)
        if (currentUser) {
            historyList.innerHTML = '<li class="text-xs text-slate-400 animate-pulse">과거 관심사 분석 중...</li>';
            try {
                // 2-1. DB에서 내 채팅 기록 가져오기
                const historyRes = await fetch(`/api/chat/history?email=${encodeURIComponent(currentUser.email)}`);
                const dbHistory = await historyRes.json();

                // 2-2. 내가 했던 과거 질문들만 5개 뽑아내기
                const pastUserMessages = dbHistory
                    .filter(msg => msg.sender === 'user')
                    .map(msg => msg.text)
                    .slice(-5);

                // 2-3. 분석할 과거 질문이 있다면 파이썬 AI 서버로 전송!
                if (pastUserMessages.length > 0) {
                    const recRes = await fetch('/api/recommend', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ department: "", history: pastUserMessages })
                    });

                    const data = await recRes.json();
                    if(data.recommendations && data.recommendations.length > 0) {
                        historyList.innerHTML = data.recommendations.map(item => `<li><a href="${item.link}" target="_blank" class="text-xs text-slate-700 hover:text-blue-600 hover:underline block leading-relaxed line-clamp-2">💡 ${item.title}</a></li>`).join('');
                    } else {
                        historyList.innerHTML = '<li class="text-xs text-slate-500">관련된 공지가 없습니다.</li>';
                    }
                } else {
                    historyList.innerHTML = '<li class="text-xs text-slate-500">과거 질문 기록이 없습니다.</li>';
                }
            } catch(e) {
                historyList.innerHTML = '<li class="text-xs text-red-500">기록을 불러오지 못했습니다.</li>';
            }
        } else {
            historyList.innerHTML = '<li class="text-xs text-slate-500">로그인하시면 관심사를 분석해 드립니다.</li>';
        }
    }

    async function handleSendMessage(text) {
        if (!text.trim() || isTypingStatus) return;

        messages.push({
            id: Date.now(), sender: 'user', text: text,
            timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        });
        document.getElementById('userInput').value = '';
        checkInput();
        renderMessages();

        isTypingStatus = true;
        document.getElementById('typingIndicator').classList.remove('hidden');
        scrollToBottom();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    message: text,
                    email: currentUser ? currentUser.email : "guest@deu.ac.kr",
                    fullName: currentUser ? currentUser.fullName : "게스트"
                })
            });

            if(!response.ok) throw new Error("서버 오류");
            const botResponse = await response.json();
            messages.push(botResponse);

        } catch(e) {
            messages.push({
                id: Date.now(), sender: 'bot', text: '서버와 연결할 수 없습니다. 잠시 후 다시 시도해주세요.',
                timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            });
        } finally {
            isTypingStatus = false;
            document.getElementById('typingIndicator').classList.add('hidden');
            renderMessages();
        }
    }

    function handleSendMessageSubmit() { handleSendMessage(document.getElementById('userInput').value); }

    function triggerGoogleSignIn() {
        document.getElementById('googleModal').classList.remove('hidden');
        if (window.google && google.accounts) {
            google.accounts.id.renderButton(document.getElementById("google-visible-btn"), { theme: "filled_blue", size: "large", width: "320" });
        }
    }
    function closeGoogleModal() { document.getElementById('googleModal').classList.add('hidden'); }

    async function handleGoogleCredentialResponse(response) {
        if (!response.credential) return;
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(decodeURIComponent(window.atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));

        if (!payload.email.endsWith("@g.deu.ac.kr")) { alert("학교 구글 계정만 사용할 수 있습니다."); return; }

        try {
            await fetch('/api/auth/google', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: payload.email, fullName: payload.name, username: payload.email.split('@')[0] })
            });
        } catch(e) { console.warn("DB 로그인 연동 실패", e); }

        currentUser = { email: payload.email, username: payload.email.split('@')[0], fullName: payload.name };
        localStorage.setItem('chatUser', JSON.stringify(currentUser));

        closeGoogleModal();
        renderHeader(); // 로그인 직후 여기서 딱 한 번 갱신됩니다!
    }

    function handleLogout() {
        currentUser = null;
        localStorage.removeItem('chatUser');
        renderHeader();
        messages.push({
            id: Date.now(), sender: 'bot', text: '로그아웃 되었습니다. 게스트 모드로 전환됩니다.',
            timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        });
        renderMessages();
    }

    async function handleOpenHistory() {
        if (!currentUser) return alert("학생 로그인이 필요합니다.");
        document.getElementById('historyModal').classList.remove('hidden');
        const container = document.getElementById('historyContainer');
        container.innerHTML = '<div class="text-center py-10 text-slate-400 animate-pulse">DB에서 기록을 불러오는 중...</div>';

        try {
            const res = await fetch(`/api/chat/history?email=${encodeURIComponent(currentUser.email)}`);
            const history = await res.json();

            if(history.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400">저장된 채팅 기록이 없습니다.</div>';
            } else {
                container.innerHTML = history.map(msg => `
                        <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold ${msg.sender === 'user' ? 'text-blue-600' : 'text-slate-700'}">${msg.sender === 'user' ? '나의 질문' : '챗봇 답변'}</span>
                                <span class="text-[10px] text-slate-400">${msg.timestamp}</span>
                            </div>
                            <p class="text-sm text-slate-800 leading-relaxed whitespace-pre-wrap">${msg.text}</p>
                        </div>
                    `).join('');
            }
        } catch(e) { container.innerHTML = '<div class="text-center py-10 text-red-400">기록을 불러오지 못했습니다.</div>'; }
    }

    function closeHistoryModal() { document.getElementById('historyModal').classList.add('hidden'); }

    async function handleDeleteHistory() {
        if(!currentUser || !confirm("모든 기록을 삭제하시겠습니까?")) return;
        await fetch(`/api/chat/history?email=${encodeURIComponent(currentUser.email)}`, { method: 'DELETE' });
        alert("삭제되었습니다."); closeHistoryModal();
    }

    window.onload = () => {
        if (window.google && google.accounts) {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredentialResponse, auto_select: false });
        }
        refreshIcons();

        try {
            const savedUser = localStorage.getItem('chatUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            }
        } catch (e) {
            console.warn("로컬 스토리지 복구 실패", e);
        }

        // 화면 켜질 때 여기서 딱 한 번 갱신됩니다!
        renderHeader();

        messages = [{
            id: 'welcome', sender: 'bot', text: '안녕하세요! 대학 생활과 관련하여 궁금한 사안이 있다면 언제든 말씀해 주세요.',
            timestamp: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        }];
        renderMessages();
    };
</script>
</body>
</html>
